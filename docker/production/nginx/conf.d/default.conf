# HTTP-only config — used during initial SSL certificate setup
# After running init-ssl.sh, this is superseded by app.conf (HTTPS)

server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS once SSL is active
    location / {
        return 301 https://$host$request_uri;
    }
}
