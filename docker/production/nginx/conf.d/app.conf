# HTTPS config — generated from this template by init-ssl.sh
# Do not edit app.conf directly; edit this template instead.

server {
    listen 443 ssl;
    server_name chat.thebingo.ai;

    ssl_certificate     /etc/letsencrypt/live/chat.thebingo.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.thebingo.ai/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # Frontend SPA static files
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # SSO API proxy (avoids browser CORS issues)
    location /sso-api/ {
        proxy_pass https://sso.thelead.io/api/v1/;
        proxy_set_header Host sso.thelead.io;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
