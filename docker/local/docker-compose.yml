name: llm-cli-local

services:
  redis:
    image: redis:7-alpine
    container_name: llm-md-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: llm-cli-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../
      dockerfile: docker/backend/Dockerfile
    container_name: llm-md-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_URL=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
      - SSO_REDIS_URL=redis://redis:6379/3
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ../../backend:/app/backend
      - ../../alembic:/app/alembic
      - ../../data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  celery-worker:
    build:
      context: ../../
      dockerfile: docker/backend/Dockerfile
    container_name: llm-md-celery
    command: celery -A backend.tasks.upload_tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_URL=redis://redis:6379/2
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - ../../.env
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ../../backend:/app/backend
      - ../../alembic:/app/alembic
      - ../../data:/app/data

  celery-beat:
    build:
      context: ../../
      dockerfile: docker/backend/Dockerfile
    container_name: llm-md-celery-beat
    command: celery -A backend.tasks.upload_tasks beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_URL=redis://redis:6379/2
    env_file:
      - ../../.env
    depends_on:
      - redis
      - backend
    volumes:
      - ../../backend:/app/backend

  agent-worker:
    build:
      context: ../../
      dockerfile: docker/backend/Dockerfile
    container_name: llm-md-agent-worker
    command: celery -A backend.tasks.upload_tasks worker --queues=agent.data,agent.dashboard,agent.rag,agent.custom --concurrency=2 --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_URL=redis://redis:6379/2
      - AGENT_MESH_REDIS_URL=redis://redis:6379/4
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - ../../backend:/app/backend
      - ../../alembic:/app/alembic
      - ../../data:/app/data

  frontend:
    build:
      context: ../../frontend
      # dockerfile path is relative to the build context (../../frontend)
      dockerfile: ../docker/frontend/Dockerfile.dev
    container_name: llm-md-frontend
    ports:
      - "3000:3000"
    environment:
      # Nuxt dev server listens on all interfaces inside the container
      - NUXT_HOST=0.0.0.0
      - NITRO_HOST=0.0.0.0
      # Internal proxy target: Nuxt dev server proxies /api/** to the backend service
      - BACKEND_INTERNAL_URL=http://backend:8000
      # Public API URL: used by the browser (must be reachable from the host)
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Bind-mount source for hot-reload
      - ../../frontend:/app
      # Named volumes keep container-internal directories separate from the host bind-mount:
      # - node_modules: avoids host/container OS/arch mismatch
      # - .nuxt: avoids conflicts between host and container Nuxt build caches
      - frontend_node_modules:/app/node_modules
      - frontend_nuxt:/app/.nuxt

volumes:
  redis_data:
  qdrant_data:
  frontend_node_modules:
  frontend_nuxt:
